databases:
  - name: aeos-db
    plan: free
    databaseName: aeos
    user: aeos

services:
  - type: redis
    name: aeos-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: aeos-backend
    plan: free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aeos-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: aeos-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: aeos-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: aeos-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: aeos-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: "https://aeos-frontend.vercel.app,https://*.vercel.app,https://*.onrender.com"
      - key: ANTHROPIC_API_KEY
        value: "sk-ant-xxxxx"
      - key: AI_DEFAULT_MODEL
        value: "claude-sonnet-4-20250514"
      - key: AI_MAX_TOKENS
        value: "4096"
    port: 10000
    healthCheckPath: /api/health
